<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Host Event</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <section class="header">
        <span class="logo">
            <img src="{{ url_for('static', filename='icons/fm copy.svg') }}" alt="fm">
        </span>
        <h1>FlakeMate</h1>
    </section>

    <section class="content">
        <div class="content-header">
            <h2>create event</h2>
        </div>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('create_host_event') }}" class="event-form">
            <label>Event name</label>
            <input type="text" name="name" required>

            <label>Location</label>
            <input type="text" name="location" required>

            <label>Date</label>
            <input type="date" name="date" required>

            <label>Time</label>
            <input type="time" name="time" required>

            <label>Details</label>
            <textarea name="details"></textarea>

            <h3>Invitees</h3>

            <div id="invitees-container">
                <div class="invitee-row">
                    <input type="text" name="invitee_username" placeholder="username">
                    <input type="time" name="invitee_time">
                </div>
            </div>

            <div class="button-row">
                <button type="button" onclick="addInvitee()">Add invitee</button>
                <button type="submit">Create Event</button>
            </div>
            
        </form>
    </section>

    <script>
        function addInvitee() {
            const container = document.getElementById("invitees-container");

            const row = document.createElement("div");
            row.classList.add("invitee-row");

            row.innerHTML = `
                <input type="text" name="invitee_username" placeholder="username">
                <input type="time" name="invitee_time">
            `;

            container.appendChild(row);
        }
    </script>
</body>
</html>
