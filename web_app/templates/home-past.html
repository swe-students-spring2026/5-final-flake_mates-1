<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../static/style.css">
    <title>Home</title>
</head>
<body>
    <section class="header">
        <p class="logo"></p>
        <h1>FlakeMate</h1>
    </section>
    <section class="nav-up">
        <a href="/home/past">past</a>
        <a href="/home/upcoming">upcoming</a>
    </section>
    <section class="content">
        <h2>past events info</h2>
        <ul class="past-events">
            {% for event in past_events %}
            <li>{{ event.name }}</li>
            <li>{{ event.location }} @ {{ event.date }}</li>
            <li>{{ event.details }}</li>
            {% endfor %}
        </ul>
    </section>
    <section class="nav-bottom">
        <a href="/home/past">past</a>
        <a href="inbox">inbox</a>
        <a href="/create">create</a>
        <a href="/user">user</a>
</body>
</html>
